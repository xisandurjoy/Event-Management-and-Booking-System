<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-client :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">My Bookings</h4>
        <a th:href="@{/client/customize}" class="btn btn-success btn-sm"><i class="bi bi-plus-lg me-1"></i>New Booking</a>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Ref</th><th>Event</th><th>Date</th><th>Venue</th><th>Total</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td class="fw-semibold" th:text="${b.bookingReference}">REF</td>
                    <td th:text="${b.category != null ? b.category.name : '-'}">Event</td>
                    <td th:text="${#temporals.format(b.eventDate,'dd MMM yyyy')}">date</td>
                    <td th:text="${b.venue}">venue</td>
                    <td th:text="'৳' + ${#numbers.formatDecimal(b.totalAmount,1,'COMMA',0,'POINT')}">0</td>
                    <td>
                        <span class="badge badge-status"
                              th:classappend="${b.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                              (${b.status.name() == 'CONFIRMED'} ? 'bg-info text-dark' :
                                              (${b.status.name() == 'IN_PROGRESS'} ? 'bg-primary' :
                                              (${b.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${b.status.label}">Status</span>
                    </td>
                    <td><a th:href="@{'/client/bookings/' + ${b.id}}" class="btn btn-sm btn-outline-success"><i class="bi bi-eye"></i></a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="7" class="text-center text-muted py-4">No bookings yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
