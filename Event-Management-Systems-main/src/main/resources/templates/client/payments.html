<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-client :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <h4 class="mb-4">Payment Status</h4>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Booking</th><th>Event Date</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td class="fw-semibold" th:text="${b.bookingReference}">REF</td>
                    <td th:text="${#temporals.format(b.eventDate,'dd MMM yyyy')}">date</td>
                    <td th:text="'৳' + ${#numbers.formatDecimal(b.totalAmount,1,'COMMA',0,'POINT')}">0</td>
                    <td class="text-success" th:text="${b.payment != null} ? '৳' + ${#numbers.formatDecimal(b.payment.paidAmount,1,'COMMA',0,'POINT')} : '৳0'">0</td>
                    <td class="text-danger" th:text="${b.payment != null} ? '৳' + ${#numbers.formatDecimal(b.payment.dueAmount,1,'COMMA',0,'POINT')} : '-'">0</td>
                    <td>
                        <span class="badge" th:if="${b.payment != null}"
                              th:classappend="${b.payment.status.name()=='PAID'}?'bg-success':(${b.payment.status.name()=='PARTIAL'}?'bg-info text-dark':'bg-warning text-dark')"
                              th:text="${b.payment.status.label}">Status</span>
                        <span class="badge bg-warning text-dark" th:if="${b.payment == null}">Pending</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="6" class="text-center text-muted py-4">No payments</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
