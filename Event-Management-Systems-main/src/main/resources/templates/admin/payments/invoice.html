<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Invoice')}"></head>
<body class="bg-light">
<div class="container my-4" style="max-width:820px;">
    <div class="card shadow-sm">
        <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-start border-bottom pb-3 mb-4">
                <div>
                    <h3 class="text-purple mb-0"><i class="bi bi-gem text-warning"></i> Shrabon Events</h3>
                    <small class="text-muted">Decorator &amp; Event Management</small><br>
                    <small class="text-muted">Proprietor: Md. Tara Mia · Dhaka, Bangladesh</small>
                </div>
                <div class="text-end">
                    <h4 class="mb-0">INVOICE</h4>
                    <small class="text-muted">#<span th:text="${booking.bookingReference}">REF</span></small><br>
                    <small class="text-muted" th:text="${#temporals.format(booking.createdAt,'dd MMM yyyy')}">date</small>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-6">
                    <h6 class="text-muted">Billed To</h6>
                    <div class="fw-semibold" th:text="${booking.client.user.fullName}">Client</div>
                    <div class="small" th:text="${booking.client.user.phone}">phone</div>
                    <div class="small" th:text="${booking.client.user.email}">email</div>
                </div>
                <div class="col-6 text-end">
                    <h6 class="text-muted">Event</h6>
                    <div class="small" th:text="${booking.category != null ? booking.category.name : 'Event'}">Type</div>
                    <div class="small" th:text="${#temporals.format(booking.eventDate,'dd MMM yyyy')}">date</div>
                    <div class="small" th:text="${booking.venue}">venue</div>
                </div>
            </div>

            <table class="table">
                <thead><tr><th>Description</th><th class="text-end">Amount</th></tr></thead>
                <tbody>
                <tr><td th:text="${booking.eventPackage != null ? booking.eventPackage.name : 'Custom Package'}">Package</td>
                    <td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(booking.baseAmount,1,'COMMA',2,'POINT')}">0</td></tr>
                <tr th:each="c : ${booking.customizations}">
                    <td class="ps-4 small" th:text="'+ ' + ${c.item.name}">Item</td>
                    <td class="text-end small" th:text="'৳' + ${#numbers.formatDecimal(c.lineTotal,1,'COMMA',2,'POINT')}">0</td>
                </tr>
                <tr><td class="text-danger">Discount</td>
                    <td class="text-end text-danger" th:text="'- ৳' + ${#numbers.formatDecimal(booking.discountAmount,1,'COMMA',2,'POINT')}">0</td></tr>
                </tbody>
                <tfoot>
                <tr class="fw-bold border-top"><td>Total</td><td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(booking.totalAmount,1,'COMMA',2,'POINT')}">0</td></tr>
                <tr class="text-success"><td>Paid</td><td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(payment.paidAmount,1,'COMMA',2,'POINT')}">0</td></tr>
                <tr class="text-danger"><td>Due</td><td class="text-end" th:text="'৳' + ${#numbers.formatDecimal(payment.dueAmount,1,'COMMA',2,'POINT')}">0</td></tr>
                </tfoot>
            </table>

            <p class="text-muted small mt-4 mb-0">Thank you for choosing Shrabon Decorator &amp; Event Management.</p>
            <div class="text-end mt-3 d-print-none">
                <button class="btn btn-purple btn-sm" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
