<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <h4 class="mb-4">Payment Management</h4>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Booking</th><th>Client</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="p : ${payments}">
                    <td class="fw-semibold" th:text="${p.booking.bookingReference}">REF</td>
                    <td th:text="${p.booking.client.user.fullName}">Client</td>
                    <td th:text="'৳' + ${#numbers.formatDecimal(p.totalAmount,1,'COMMA',0,'POINT')}">0</td>
                    <td class="text-success" th:text="'৳' + ${#numbers.formatDecimal(p.paidAmount,1,'COMMA',0,'POINT')}">0</td>
                    <td class="text-danger" th:text="'৳' + ${#numbers.formatDecimal(p.dueAmount,1,'COMMA',0,'POINT')}">0</td>
                    <td>
                        <span class="badge" th:classappend="${p.status.name()=='PAID'}?'bg-success':(${p.status.name()=='PARTIAL'}?'bg-info text-dark':'bg-warning text-dark')"
                              th:text="${p.status.label}">Status</span>
                    </td>
                    <td><a th:href="@{'/admin/payments/booking/' + ${p.booking.id}}" class="btn btn-sm btn-purple">Manage</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}"><td colspan="7" class="text-center text-muted py-4">No payment records</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
