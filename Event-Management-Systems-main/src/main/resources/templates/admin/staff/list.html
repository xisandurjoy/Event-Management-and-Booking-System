<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Staff Management</h4>
        <div>
            <a th:href="@{/admin/tasks}" class="btn btn-outline-purple btn-sm" style="border-color:var(--primary);color:var(--primary);"><i class="bi bi-list-task me-1"></i>Tasks</a>
            <a th:href="@{/admin/staff/new}" class="btn btn-purple btn-sm"><i class="bi bi-plus-lg me-1"></i>New Staff</a>
        </div>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Name</th><th>Email</th><th>Position</th><th>Salary</th><th>Skills</th><th>Availability</th><th></th></tr></thead>
                <tbody>
                <tr th:each="s : ${staffList}">
                    <td class="fw-semibold" th:text="${s.user.fullName}">Name</td>
                    <td th:text="${s.user.email}">email</td>
                    <td th:text="${s.position}">position</td>
                    <td th:text="'৳' + ${#numbers.formatDecimal(s.salary,1,'COMMA',0,'POINT')}">0</td>
                    <td class="small text-muted" th:text="${#strings.abbreviate(s.skills,40)}">skills</td>
                    <td>
                        <span class="badge" th:classappend="${s.availability.name()=='AVAILABLE'}?'bg-success':(${s.availability.name()=='BUSY'}?'bg-warning text-dark':'bg-secondary')"
                              th:text="${s.availability.label}">status</span>
                    </td>
                    <td class="text-nowrap">
                        <a th:href="@{'/admin/staff/' + ${s.id} + '/edit'}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{'/admin/staff/' + ${s.id} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Remove staff member?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(staffList)}"><td colspan="7" class="text-center text-muted py-4">No staff added</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
