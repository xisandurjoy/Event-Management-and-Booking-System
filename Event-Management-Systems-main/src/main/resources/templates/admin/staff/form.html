<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0" th:text="${staffForm.id} != null ? 'Edit Staff' : 'New Staff'">Staff</h4>
        <a th:href="@{/admin/staff}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/staff/save}" th:object="${staffForm}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input class="form-control" th:field="*{fullName}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input class="form-control" th:field="*{phone}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password <small class="text-muted">(leave blank to keep / default Staff@12345)</small></label>
                        <input type="password" class="form-control" th:field="*{password}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Position</label>
                        <input class="form-control" th:field="*{position}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{position}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Salary (৳)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{salary}">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Skills</label>
                        <input class="form-control" th:field="*{skills}" placeholder="Decoration, Stage setup, Coordination">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Availability</label>
                        <select class="form-select" th:field="*{availability}">
                            <option th:each="a : ${availabilities}" th:value="${a}" th:text="${a.label}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-purple px-4"><i class="bi bi-save me-1"></i>Save Staff</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
