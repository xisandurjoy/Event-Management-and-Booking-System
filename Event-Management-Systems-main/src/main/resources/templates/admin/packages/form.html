<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0" th:text="${packageForm.id} != null ? 'Edit Package' : 'New Package'">Package</h4>
        <a th:href="@{/admin/packages}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/packages/save}" th:object="${packageForm}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Package Name</label>
                        <input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <select class="form-select" th:field="*{categoryId}">
                            <option value="">-- None --</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Base Price (৳)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{basePrice}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{basePrice}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Discount (%)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{discountPercent}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Guest Capacity</label>
                        <input type="number" class="form-control" th:field="*{guestCapacity}">
                    </div>

                    <div class="col-12"><hr><h6>Inclusions</h6></div>
                    <div class="col-md-3 col-6 form-check ms-3"><input class="form-check-input" type="checkbox" th:field="*{decoration}" id="dec"><label class="form-check-label" for="dec">Decoration</label></div>
                    <div class="col-md-3 col-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{catering}" id="cat"><label class="form-check-label" for="cat">Catering</label></div>
                    <div class="col-md-3 col-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{photography}" id="pho"><label class="form-check-label" for="pho">Photography</label></div>
                    <div class="col-md-3 col-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{videography}" id="vid"><label class="form-check-label" for="vid">Videography</label></div>
                    <div class="col-md-3 col-6 form-check ms-3"><input class="form-check-input" type="checkbox" th:field="*{lighting}" id="lig"><label class="form-check-label" for="lig">Lighting</label></div>
                    <div class="col-md-3 col-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{soundSystem}" id="snd"><label class="form-check-label" for="snd">Sound System</label></div>
                    <div class="col-md-3 col-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{stageSetup}" id="stg"><label class="form-check-label" for="stg">Stage Setup</label></div>

                    <div class="col-md-6">
                        <label class="form-label">Features (one per line)</label>
                        <textarea class="form-control" rows="4" th:field="*{featuresText}" placeholder="Bridal stage&#10;Welcome gate&#10;Fresh flowers"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Image URLs (one per line)</label>
                        <textarea class="form-control" rows="4" th:field="*{imageUrls}" placeholder="https://...jpg"></textarea>
                    </div>

                    <div class="col-md-6 form-check ms-3"><input class="form-check-input" type="checkbox" th:field="*{featured}" id="feat"><label class="form-check-label" for="feat">Show as Featured</label></div>
                    <div class="col-md-6 form-check"><input class="form-check-input" type="checkbox" th:field="*{active}" id="act"><label class="form-check-label" for="act">Active</label></div>

                    <div class="col-12">
                        <button class="btn btn-purple px-4"><i class="bi bi-save me-1"></i>Save Package</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
