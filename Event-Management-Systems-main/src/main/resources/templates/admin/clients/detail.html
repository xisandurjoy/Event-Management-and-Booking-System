<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Client Profile</h4>
        <a th:href="@{/admin/clients}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body text-center">
                    <span class="avatar-circle mx-auto mb-2" style="width:70px;height:70px;font-size:1.8rem;"><i class="bi bi-person-fill"></i></span>
                    <h5 th:text="${client.user.fullName}">Name</h5>
                    <p class="text-muted small mb-1" th:text="${client.user.email}">email</p>
                    <p class="text-muted small" th:text="${client.user.phone}">phone</p>
                    <dl class="row text-start small mt-3 mb-0">
                        <dt class="col-5">Address</dt><dd class="col-7" th:text="${client.address} ?: '-'">-</dd>
                        <dt class="col-5">City</dt><dd class="col-7" th:text="${client.city} ?: '-'">-</dd>
                        <dt class="col-5">NID</dt><dd class="col-7" th:text="${client.nid} ?: '-'">-</dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">Booking History</div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead><tr><th>Ref</th><th>Date</th><th>Status</th><th>Total</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="b : ${bookings}">
                            <td th:text="${b.bookingReference}">REF</td>
                            <td th:text="${#temporals.format(b.eventDate,'dd MMM yyyy')}">date</td>
                            <td><span class="badge bg-secondary badge-status" th:text="${b.status.label}">Status</span></td>
                            <td th:text="'৳' + ${#numbers.formatDecimal(b.totalAmount,1,'COMMA',0,'POINT')}">0</td>
                            <td><a th:href="@{'/admin/bookings/' + ${b.id}}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="5" class="text-center text-muted py-4">No bookings</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
