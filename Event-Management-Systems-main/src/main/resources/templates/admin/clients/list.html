<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="mb-0">Client Management</h4>
        <form th:action="@{/admin/clients}" method="get" class="d-flex" style="max-width:340px;">
            <input type="text" name="q" class="form-control form-control-sm" placeholder="Search name, email, phone, city" th:value="${query}">
            <button class="btn btn-sm btn-purple ms-2"><i class="bi bi-search"></i></button>
        </form>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>NID</th><th></th></tr></thead>
                <tbody>
                <tr th:each="c : ${clients}">
                    <td class="fw-semibold" th:text="${c.user.fullName}">Name</td>
                    <td th:text="${c.user.email}">email</td>
                    <td th:text="${c.user.phone}">phone</td>
                    <td th:text="${c.city} ?: '-'">city</td>
                    <td th:text="${c.nid} ?: '-'">nid</td>
                    <td class="text-nowrap">
                        <a th:href="@{'/admin/clients/' + ${c.id}}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                        <form th:action="@{'/admin/clients/' + ${c.id} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Delete this client and all their data?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(clients)}"><td colspan="6" class="text-center text-muted py-4">No clients found</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
