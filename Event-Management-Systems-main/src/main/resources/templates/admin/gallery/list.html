<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-admin :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <h4 class="mb-4">Gallery Management</h4>
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/gallery/save}" method="post" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Image URL</label>
                    <input class="form-control" name="imageUrl" required placeholder="https://...jpg">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Title</label>
                    <input class="form-control" name="title">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Category</label>
                    <input class="form-control" name="category" placeholder="Wedding">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-purple w-100"><i class="bi bi-plus-lg me-1"></i>Add</button>
                </div>
            </form>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-lg-3 col-md-4 col-6" th:each="g : ${galleryItems}">
            <div class="card">
                <img th:src="${g.imageUrl}" class="card-img-top" style="height:160px;object-fit:cover;" alt="">
                <div class="card-body p-2 d-flex justify-content-between align-items-center">
                    <small class="text-muted text-truncate" th:text="${g.title} ?: 'Untitled'">title</small>
                    <form th:action="@{'/admin/gallery/' + ${g.id} + '/delete'}" method="post" onsubmit="return confirm('Delete image?');">
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 text-center text-muted py-4" th:if="${#lists.isEmpty(galleryItems)}">No gallery images yet</div>
    </div>
</div>
</body>
</html>
