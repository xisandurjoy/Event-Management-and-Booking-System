<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark fixed-top public-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-badge"><i class="bi bi-gem"></i></span>
            <span class="brand-text">Shrabon <span class="text-gold">Events</span>
                <small class="brand-tagline">Decorator &amp; Event Management</small>
            </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='home'}?'active'" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='about'}?'active'" th:href="@{/about}">About Us</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='services'}?'active'" th:href="@{/services}">Services</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='packages'}?'active'" th:href="@{/packages}">Packages</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='gallery'}?'active'" th:href="@{/gallery}">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='reviews'}?'active'" th:href="@{/reviews}">Reviews</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active=='contact'}?'active'" th:href="@{/contact}">Contact</a></li>

                <li class="nav-item ms-lg-3" sec:authorize="isAnonymous()">
                    <a class="btn btn-nav-login btn-sm" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                </li>
                <li class="nav-item ms-lg-2" sec:authorize="isAnonymous()">
                    <a class="btn btn-nav-register btn-sm" th:href="@{/register}"><i class="bi bi-stars me-1"></i>Register</a>
                </li>

                <li class="nav-item dropdown ms-lg-3 navbar-account" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <span class="avatar-dot"><i class="bi bi-person-fill"></i></span>
                        <span th:text="${currentUserName}">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</a></li>
                        <li sec:authorize="hasRole('STAFF')"><a class="dropdown-item" th:href="@{/staff/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Staff Dashboard</a></li>
                        <li sec:authorize="hasRole('CLIENT')"><a class="dropdown-item" th:href="@{/client/dashboard}"><i class="bi bi-speedometer2 me-2"></i>My Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-danger w-100" type="submit"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
