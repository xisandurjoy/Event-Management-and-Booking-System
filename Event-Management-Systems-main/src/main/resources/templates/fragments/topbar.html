<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="topbar" class="dash-topbar">
    <button class="btn btn-sm btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-title fw-semibold" th:text="${pageHeading} ?: 'Dashboard'">Dashboard</div>
    <div class="ms-auto d-flex align-items-center gap-3">
        <a th:href="@{/}" class="text-decoration-none small text-muted d-none d-sm-inline">
            <i class="bi bi-house-door me-1"></i>View Website
        </a>
        <div class="dropdown">
            <a class="d-flex align-items-center text-decoration-none dropdown-toggle topbar-user" href="#" data-bs-toggle="dropdown">
                <span class="avatar-circle"><i class="bi bi-person-fill"></i></span>
                <span class="ms-2 d-none d-sm-inline" th:text="${currentUserName}">User</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li sec:authorize="hasRole('CLIENT')"><a class="dropdown-item" th:href="@{/client/profile}"><i class="bi bi-gear me-2"></i>Profile</a></li>
                <li><a class="dropdown-item" th:href="@{/}"><i class="bi bi-globe me-2"></i>Website</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <button class="dropdown-item text-danger" type="submit">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>
</body>
</html>
