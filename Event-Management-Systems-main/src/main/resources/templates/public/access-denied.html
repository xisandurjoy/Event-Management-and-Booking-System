<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Access Denied')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container text-center text-white">
        <i class="bi bi-shield-lock display-1 text-warning"></i>
        <h1 class="mt-3">403 — Access Denied</h1>
        <p class="lead">You do not have permission to view this page.</p>
        <a th:href="@{/}" class="btn btn-accent mt-2">Back to Home</a>
        <a th:href="@{/login}" class="btn btn-outline-light mt-2">Login as a different user</a>
    </div>
</div>
</body>
</html>
