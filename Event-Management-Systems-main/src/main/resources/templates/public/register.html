<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="card auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a th:href="@{/}" class="text-decoration-none"><i class="bi bi-gem display-5 text-warning"></i></a>
                        <h3 class="mt-2 mb-0">Create Your Account</h3>
                        <p class="text-muted small">Register as a client to book events</p>
                    </div>

                    <form th:action="@{/register}" th:object="${registerForm}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:field="*{fullName}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" th:field="*{phone}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">City</label>
                                <input type="text" class="form-control" th:field="*{city}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" th:field="*{address}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">NID (optional)</label>
                                <input type="text" class="form-control" th:field="*{nid}">
                            </div>
                            <div class="col-md-6"></div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" th:field="*{password}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" th:field="*{confirmPassword}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-purple w-100">Create Account</button>
                            </div>
                        </div>
                    </form>

                    <p class="text-center small mt-4 mb-0">
                        Already registered? <a th:href="@{/login}" class="fw-semibold">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
