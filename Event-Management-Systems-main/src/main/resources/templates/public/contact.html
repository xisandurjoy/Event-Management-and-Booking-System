<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contact Us')}"></head>
<body>
<nav th:replace="~{fragments/public-navbar :: navbar('contact')}"></nav>

<section class="section" style="padding-top:130px;">
    <div class="container">
        <div class="text-center">
            <div class="divider-accent"></div>
            <h2 class="section-title">Contact Us</h2>
            <p class="section-subtitle">We would love to hear about your event</p>
        </div>

        <div class="row g-5">
            <div class="col-lg-5">
                <div class="why-box h-100">
                    <h4 class="mb-4">Get in Touch</h4>
                    <p><span class="icon-circle" style="width:46px;height:46px;font-size:1.1rem;"><i class="bi bi-geo-alt"></i></span>
                        <span class="ms-2">Dhaka, Bangladesh</span></p>
                    <p><span class="icon-circle" style="width:46px;height:46px;font-size:1.1rem;"><i class="bi bi-telephone"></i></span>
                        <span class="ms-2">+880 1956560391</span></p>
                    <p><span class="icon-circle" style="width:46px;height:46px;font-size:1.1rem;"><i class="bi bi-envelope"></i></span>
                        <span class="ms-2">jfrtmsne@gmail.com</span></p>
                    <p class="mb-0"><span class="icon-circle" style="width:46px;height:46px;font-size:1.1rem;"><i class="bi bi-person-badge"></i></span>
                        <span class="ms-2">Proprietor: MD. Tara Mia</span></p>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card p-4">
                    <div th:replace="~{fragments/alerts :: alerts}"></div>
                    <form th:action="@{/contact}" th:object="${contactForm}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" th:field="*{phone}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control" th:field="*{subject}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="5" th:field="*{message}" th:errorclass="is-invalid"></textarea>
                                <div class="invalid-feedback" th:errors="*{message}"></div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-purple px-4"><i class="bi bi-send me-2"></i>Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
