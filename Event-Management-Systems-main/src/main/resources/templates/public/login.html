<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a th:href="@{/}" class="text-decoration-none">
                            <i class="bi bi-gem display-5 text-warning"></i>
                        </a>
                        <h3 class="mt-2 mb-0">Welcome Back</h3>
                        <p class="text-muted small">Sign in to Shrabon Events</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2">Invalid email or password.</div>
                    <div th:if="${param.logout}" class="alert alert-success py-2">You have been logged out.</div>
                    <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" required autofocus placeholder="you@example.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-purple w-100">Sign In</button>
                    </form>

                    <p class="text-center small mt-4 mb-0">
                        Don't have an account? <a th:href="@{/register}" class="fw-semibold">Register</a>
                    </p>
                    <p class="text-center small mt-2 text-muted mb-0">
                        <a th:href="@{/}" class="text-muted"><i class="bi bi-arrow-left"></i> Back to website</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
