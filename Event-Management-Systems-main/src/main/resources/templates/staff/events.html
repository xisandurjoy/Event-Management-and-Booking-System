<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-staff :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <h4 class="mb-4">Assigned Events</h4>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Ref</th><th>Event Type</th><th>Date</th><th>Time</th><th>Venue</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="e : ${events}">
                    <td th:text="${e.bookingReference}">REF</td>
                    <td th:text="${e.category != null ? e.category.name : '-'}">Type</td>
                    <td th:text="${#temporals.format(e.eventDate,'dd MMM yyyy')}">date</td>
                    <td th:text="${e.eventTime} ?: '-'">time</td>
                    <td th:text="${e.venue}">venue</td>
                    <td><span class="badge bg-secondary badge-status" th:text="${e.status.label}">Status</span></td>
                    <td><a th:href="@{'/staff/events/' + ${e.id}}" class="btn btn-sm btn-outline-info"><i class="bi bi-eye"></i></a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(events)}"><td colspan="7" class="text-center text-muted py-4">No assigned events</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
