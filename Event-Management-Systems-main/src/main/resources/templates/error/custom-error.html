<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Error')}"></head>
<body>
<div class="auth-wrapper">
    <div class="container text-center text-white">
        <i class="bi bi-exclamation-octagon display-1 text-warning"></i>
        <h1 class="mt-3" th:text="${status} ?: 'Error'">Error</h1>
        <h4 th:text="${errorTitle} ?: 'Something went wrong'">Something went wrong</h4>
        <p class="lead" th:text="${errorMessage}">Details</p>
        <a th:href="@{/}" class="btn btn-accent mt-2">Back to Home</a>
    </div>
</div>
</body>
</html>
