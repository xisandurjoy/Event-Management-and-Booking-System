# ============================================================
#  Shrabon Decorator & Event Management - Application Config
# ============================================================
spring.application.name=Shrabon Decorator & Event Management

# Active profile: 'mysql' (default, production) or 'dev' (H2 in-memory)
spring.profiles.active=mysql

# ---------- Thymeleaf ----------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ---------- File Upload ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads

# ---------- Server ----------
server.port=8080
server.error.whitelabel.enabled=false

# ---------- JPA (common) ----------
# Keep open-in-view enabled so Thymeleaf can safely render lazy associations
# (booking items, package images/features, payment transactions, etc.).
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Logging ----------
logging.level.org.springframework.security=INFO
logging.level.com.shrabon=DEBUG

# ---------- Default admin bootstrap (used by DataInitializer) ----------
app.admin.email=admin@shrabonevents.com
app.admin.password=Admin@12345
app.admin.name=Md. Tara Mia

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/shrabon_events
spring.datasource.username=root
spring.datasource.password=248888

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

